name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      bridge: ${{ steps.filter.outputs.bridge }}
      godot-plugin: ${{ steps.filter.outputs.godot-plugin }}
      gdscript-lsp: ${{ steps.filter.outputs.gdscript-lsp }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            bridge:
              - 'bridge/**'
            godot-plugin:
              - 'godot-plugin/**'
            gdscript-lsp:
              - 'gdscript-lsp/**'

  build-cli:
    needs: detect-changes
    if: needs.detect-changes.outputs.bridge == 'true'
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: bridge/go.mod
          cache-dependency-path: bridge/go.sum
      - name: Run CLI unit tests
        run: go test ./...
      - name: Build CLI
        run: go build -o /tmp/godot-bridge ./cmd/godot-bridge
      - name: Verify CLI version command
        run: test -x /tmp/godot-bridge

  build-godot-plugin:
    needs: detect-changes
    if: needs.detect-changes.outputs.godot-plugin == 'true'
    runs-on: ubuntu-latest
    container: barichello/godot-ci:4.3
    defaults:
      run:
        working-directory: godot-plugin
    steps:
      - uses: actions/checkout@v4
      - name: Run plugin unit tests
        run: bash scripts/test.sh

  build-gdscript-lsp:
    needs: detect-changes
    if: needs.detect-changes.outputs.gdscript-lsp == 'true'
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: gdscript-lsp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: gdscript-lsp/go.mod
          cache-dependency-path: gdscript-lsp/go.mod
      - name: Build proxy
        run: go build -o /tmp/gdscript-lsp-proxy ./cmd/gdscript-lsp-proxy
      - name: Verify proxy version command
        run: test -x /tmp/gdscript-lsp-proxy
