name: PR Auto Label

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  label-components:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            cli:
              - 'cli/**'
            godot-plugin:
              - 'godot-plugin/**'
            gdscript-lsp:
              - 'gdscript-lsp/**'

      - name: Apply component labels
        uses: actions/github-script@v7
        env:
          CLI_CHANGED: ${{ steps.filter.outputs.cli }}
          GODOT_PLUGIN_CHANGED: ${{ steps.filter.outputs.godot-plugin }}
          GDSCRIPT_LSP_CHANGED: ${{ steps.filter.outputs.gdscript-lsp }}
        with:
          script: |
            const labels = []
            if (process.env.CLI_CHANGED === 'true') labels.push('component: cli')
            if (process.env.GODOT_PLUGIN_CHANGED === 'true') labels.push('component: godot-plugin')
            if (process.env.GDSCRIPT_LSP_CHANGED === 'true') labels.push('component: gdscript-lsp')

            if (labels.length === 0) {
              core.info('No component labels to apply')
              return
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels,
            })
            core.info(`Applied labels: ${labels.join(', ')}`)
