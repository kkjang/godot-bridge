name: Release

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

permissions:
  contents: write

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Read release manifest
        id: manifest
        run: |
          set -eu
          cli_version=$(grep '^cli:' releases.yaml | cut -d: -f2 | xargs)
          gdscript_lsp_version=$(grep '^gdscript-lsp:' releases.yaml | cut -d: -f2 | xargs)
          plugin_version=$(grep '^godot-plugin:' releases.yaml | cut -d: -f2 | xargs)
          echo "cli_version=$cli_version" >> "$GITHUB_OUTPUT"
          echo "gdscript_lsp_version=$gdscript_lsp_version" >> "$GITHUB_OUTPUT"
          echo "plugin_version=$plugin_version" >> "$GITHUB_OUTPUT"

      - name: Create CLI release when needed
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.manifest.outputs.cli_version }}
          TAG_NAME: cli/${{ steps.manifest.outputs.cli_version }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          script: |
            const tag = process.env.TAG_NAME
            const version = process.env.VERSION
            const target = process.env.TARGET_SHA
            if (!/^v\d+\.\d+\.\d+$/.test(version)) {
              core.setFailed(`cli version must be semver like v1.2.3, got ${version}`)
              return
            }
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              })
              core.info(`Release ${tag} already exists; skipping`)
              return
            } catch (error) {
              if (error.status !== 404) throw error
            }
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: target,
              name: `CLI ${version}`,
              generate_release_notes: true,
            })
            core.info(`Created release ${tag}`)

      - name: Create Godot plugin release when needed
        id: plugin_release
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.manifest.outputs.plugin_version }}
          TAG_NAME: godot-plugin/${{ steps.manifest.outputs.plugin_version }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          script: |
            const tag = process.env.TAG_NAME
            const version = process.env.VERSION
            const target = process.env.TARGET_SHA
            if (!/^v\d+\.\d+\.\d+$/.test(version)) {
              core.setFailed(`godot-plugin version must be semver like v1.2.3, got ${version}`)
              return
            }
            let release
            try {
              release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              })
              core.info(`Release ${tag} already exists; reusing it for asset upload`)
            } catch (error) {
              if (error.status !== 404) throw error
              release = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                target_commitish: target,
                name: `Godot Plugin ${version}`,
                generate_release_notes: true,
              })
              core.info(`Created release ${tag}`)
            }
            core.setOutput('release_id', String(release.data.id))

      - name: Package Godot plugin
        id: plugin_package
        working-directory: godot-plugin
        run: |
          set -eu
          archive_path=$(bash scripts/package.sh "${{ steps.manifest.outputs.plugin_version }}" /tmp/godot-plugin-dist)
          echo "archive_path=$archive_path" >> "$GITHUB_OUTPUT"

      - name: Upload Godot plugin artifact
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ steps.plugin_release.outputs.release_id }}
          ARCHIVE_PATH: ${{ steps.plugin_package.outputs.archive_path }}
          VERSION: ${{ steps.manifest.outputs.plugin_version }}
        with:
          script: |
            const fs = require('fs')
            const path = require('path')
            const releaseId = Number(process.env.RELEASE_ID)
            const archivePath = process.env.ARCHIVE_PATH
            const assetName = path.basename(archivePath)
            const release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            })
            const existing = release.data.assets.find((asset) => asset.name === assetName)
            if (existing) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existing.id,
              })
            }
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: assetName,
              data: fs.readFileSync(archivePath),
            })
            core.info(`Uploaded ${assetName}`)

      - name: Create GDScript LSP release when needed
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.manifest.outputs.gdscript_lsp_version }}
          TAG_NAME: gdscript-lsp/${{ steps.manifest.outputs.gdscript_lsp_version }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          script: |
            const tag = process.env.TAG_NAME
            const version = process.env.VERSION
            const target = process.env.TARGET_SHA
            if (!/^v\d+\.\d+\.\d+$/.test(version)) {
              core.setFailed(`gdscript-lsp version must be semver like v1.2.3, got ${version}`)
              return
            }
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              })
              core.info(`Release ${tag} already exists; skipping`)
              return
            } catch (error) {
              if (error.status !== 404) throw error
            }
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: target,
              name: `GDScript LSP ${version}`,
              generate_release_notes: true,
            })
            core.info(`Created release ${tag}`)
