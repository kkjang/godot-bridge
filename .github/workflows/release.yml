name: Release

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

permissions:
  contents: write

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Read release manifest and previous tags
        id: manifest
        run: |
          set -eu
          git fetch --force --tags origin
          bridge_version=$(grep '^bridge:' releases.yaml | cut -d: -f2 | xargs)
          gdscript_lsp_version=$(grep '^gdscript-lsp:' releases.yaml | cut -d: -f2 | xargs)
          plugin_version=$(grep '^godot-plugin:' releases.yaml | cut -d: -f2 | xargs)
          previous_bridge_tag=$(git tag --list 'bridge/v*' --sort=-version:refname | grep -vx "bridge/${bridge_version}" | sed -n '1p' || true)
          previous_gdscript_lsp_tag=$(git tag --list 'gdscript-lsp/v*' --sort=-version:refname | grep -vx "gdscript-lsp/${gdscript_lsp_version}" | sed -n '1p' || true)
          previous_plugin_tag=$(git tag --list 'godot-plugin/v*' --sort=-version:refname | grep -vx "godot-plugin/${plugin_version}" | sed -n '1p' || true)
          echo "bridge_version=$bridge_version" >> "$GITHUB_OUTPUT"
          echo "gdscript_lsp_version=$gdscript_lsp_version" >> "$GITHUB_OUTPUT"
          echo "plugin_version=$plugin_version" >> "$GITHUB_OUTPUT"
          echo "previous_bridge_tag=$previous_bridge_tag" >> "$GITHUB_OUTPUT"
          echo "previous_gdscript_lsp_tag=$previous_gdscript_lsp_tag" >> "$GITHUB_OUTPUT"
          echo "previous_plugin_tag=$previous_plugin_tag" >> "$GITHUB_OUTPUT"

      - name: Create CLI release when needed
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.manifest.outputs.bridge_version }}
          TAG_NAME: bridge/${{ steps.manifest.outputs.bridge_version }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
          PREVIOUS_TAG: ${{ steps.manifest.outputs.previous_bridge_tag }}
          CONFIG_PATH: .github/release-cli.yml
        with:
          script: |
            const tag = process.env.TAG_NAME
            const version = process.env.VERSION
            const target = process.env.TARGET_SHA
            const previousTag = process.env.PREVIOUS_TAG || undefined
            const configPath = process.env.CONFIG_PATH
            if (!/^v\d+\.\d+\.\d+$/.test(version)) {
              core.setFailed(`bridge version must be semver like v1.2.3, got ${version}`)
              return
            }
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              })
              core.info(`Release ${tag} already exists; skipping`)
              return
            } catch (error) {
              if (error.status !== 404) throw error
            }
            const notes = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: target,
              previous_tag_name: previousTag,
              configuration_file_path: configPath,
            })
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: target,
              name: `CLI ${version}`,
              body: notes.data.body,
            })
            core.info(`Created release ${tag}`)

      - name: Create Godot plugin release when needed
        id: plugin_release
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.manifest.outputs.plugin_version }}
          TAG_NAME: godot-plugin/${{ steps.manifest.outputs.plugin_version }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
          PREVIOUS_TAG: ${{ steps.manifest.outputs.previous_plugin_tag }}
          CONFIG_PATH: .github/release-godot-plugin.yml
        with:
          script: |
            const tag = process.env.TAG_NAME
            const version = process.env.VERSION
            const target = process.env.TARGET_SHA
            const previousTag = process.env.PREVIOUS_TAG || undefined
            const configPath = process.env.CONFIG_PATH
            if (!/^v\d+\.\d+\.\d+$/.test(version)) {
              core.setFailed(`godot-plugin version must be semver like v1.2.3, got ${version}`)
              return
            }
            let release
            try {
              release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              })
              core.info(`Release ${tag} already exists; skipping plugin publish flow`)
              core.setOutput('release_id', String(release.data.id))
              core.setOutput('created', 'false')
              return
            } catch (error) {
              if (error.status !== 404) throw error
              const notes = await github.rest.repos.generateReleaseNotes({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                target_commitish: target,
                previous_tag_name: previousTag,
                configuration_file_path: configPath,
              })
              release = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                target_commitish: target,
                name: `Godot Plugin ${version}`,
                body: notes.data.body,
                draft: true,
              })
              core.info(`Created draft release ${tag}`)
            }
            core.setOutput('release_id', String(release.data.id))
            core.setOutput('created', 'true')

      - name: Package Godot plugin
        id: plugin_package
        if: steps.plugin_release.outputs.created == 'true'
        working-directory: godot-plugin
        run: |
          set -eu
          archive_path=$(bash scripts/package.sh "${{ steps.manifest.outputs.plugin_version }}" /tmp/godot-plugin-dist)
          echo "archive_path=$archive_path" >> "$GITHUB_OUTPUT"

      - name: Upload Godot plugin artifact
        if: steps.plugin_release.outputs.created == 'true'
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ steps.plugin_release.outputs.release_id }}
          ARCHIVE_PATH: ${{ steps.plugin_package.outputs.archive_path }}
          VERSION: ${{ steps.manifest.outputs.plugin_version }}
        with:
          script: |
            const fs = require('fs')
            const path = require('path')
            const releaseId = Number(process.env.RELEASE_ID)
            const archivePath = process.env.ARCHIVE_PATH
            const assetName = path.basename(archivePath)
            const release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            })
            const existing = release.data.assets.find((asset) => asset.name === assetName)
            if (existing) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existing.id,
              })
            }
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: assetName,
              data: fs.readFileSync(archivePath),
            })
            core.info(`Uploaded ${assetName}`)

      - name: Publish Godot plugin release
        if: steps.plugin_release.outputs.created == 'true'
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ steps.plugin_release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false,
            })
            core.info('Published Godot plugin release')

      - name: Create GDScript LSP release when needed
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.manifest.outputs.gdscript_lsp_version }}
          TAG_NAME: gdscript-lsp/${{ steps.manifest.outputs.gdscript_lsp_version }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
          PREVIOUS_TAG: ${{ steps.manifest.outputs.previous_gdscript_lsp_tag }}
          CONFIG_PATH: .github/release-gdscript-lsp.yml
        with:
          script: |
            const tag = process.env.TAG_NAME
            const version = process.env.VERSION
            const target = process.env.TARGET_SHA
            const previousTag = process.env.PREVIOUS_TAG || undefined
            const configPath = process.env.CONFIG_PATH
            if (!/^v\d+\.\d+\.\d+$/.test(version)) {
              core.setFailed(`gdscript-lsp version must be semver like v1.2.3, got ${version}`)
              return
            }
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              })
              core.info(`Release ${tag} already exists; skipping`)
              return
            } catch (error) {
              if (error.status !== 404) throw error
            }
            const notes = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: target,
              previous_tag_name: previousTag,
              configuration_file_path: configPath,
            })
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: target,
              name: `GDScript LSP ${version}`,
              body: notes.data.body,
            })
            core.info(`Created release ${tag}`)
