name: PR Component Labels

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: write

jobs:
  apply-component-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            cli:
              - 'cli/**'
            godot-plugin:
              - 'godot-plugin/**'
            gdscript-lsp:
              - 'gdscript-lsp/**'

      - name: Apply missing path-based component labels
        uses: actions/github-script@v7
        env:
          CLI_CHANGED: ${{ steps.filter.outputs.cli }}
          GODOT_PLUGIN_CHANGED: ${{ steps.filter.outputs.godot-plugin }}
          GDSCRIPT_LSP_CHANGED: ${{ steps.filter.outputs.gdscript-lsp }}
        with:
          script: |
            const expected = []
            if (process.env.CLI_CHANGED === 'true') expected.push('component: cli')
            if (process.env.GODOT_PLUGIN_CHANGED === 'true') expected.push('component: godot-plugin')
            if (process.env.GDSCRIPT_LSP_CHANGED === 'true') expected.push('component: gdscript-lsp')

            if (expected.length === 0) {
              core.info('No component labels required for this PR')
              return
            }

            const current = new Set((context.payload.pull_request.labels || []).map((label) => label.name))
            const missing = expected.filter((label) => !current.has(label))

            if (missing.length === 0) {
              core.info('All required component labels already present')
              return
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: missing,
            })
            core.info(`Applied missing labels: ${missing.join(', ')}`)
