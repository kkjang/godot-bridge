name: PR Component Labels

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-component-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            cli:
              - 'cli/**'
            godot-plugin:
              - 'godot-plugin/**'
            gdscript-lsp:
              - 'gdscript-lsp/**'

      - name: Validate required component labels
        uses: actions/github-script@v7
        env:
          CLI_CHANGED: ${{ steps.filter.outputs.cli }}
          GODOT_PLUGIN_CHANGED: ${{ steps.filter.outputs.godot-plugin }}
          GDSCRIPT_LSP_CHANGED: ${{ steps.filter.outputs.gdscript-lsp }}
        with:
          script: |
            const labels = new Set((context.payload.pull_request.labels || []).map((label) => label.name))
            const missing = []

            if (process.env.CLI_CHANGED === 'true' && !labels.has('component: cli')) {
              missing.push('component: cli')
            }
            if (process.env.GODOT_PLUGIN_CHANGED === 'true' && !labels.has('component: godot-plugin')) {
              missing.push('component: godot-plugin')
            }
            if (process.env.GDSCRIPT_LSP_CHANGED === 'true' && !labels.has('component: gdscript-lsp')) {
              missing.push('component: gdscript-lsp')
            }

            if (missing.length > 0) {
              core.setFailed(`Missing required component labels: ${missing.join(', ')}`)
              return
            }

            core.info('Required component labels are present')
